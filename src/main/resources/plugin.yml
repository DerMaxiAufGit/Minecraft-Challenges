name: ChallengePlugin
version: 1.3.1
main: de.challenge.ChallengePlugin
api-version: "1.21"
commands:
  challenge:
    description: Open the challenge GUI
    aliases: [c, challenges]
    permission: challengeplugin.challenge
  timer:
    description: Manage the challenge timer
    permission: challengeplugin.timer
  settings:
    description: Alias for /challenge
    aliases: [settings]
    permission: challengeplugin.challenge
  reset:
    description: Reset the challenge world
    permission: challengeplugin.reset
    permission-message: You do not have permission to reset the world.
  backpack:
    description: Open the shared backpack
    permission: challengeplugin.backpack
  village:
    description: Teleport to the nearest village
    permission: challengeplugin.village
permissions:
  challengeplugin.challenge:
    description: Access the challenge GUI
    default: op
  challengeplugin.timer:
    description: Manage the challenge timer
    default: op
  challengeplugin.reset:
    description: Reset the challenge world
    default: op
  challengeplugin.backpack:
    description: Use the shared backpack
    default: true
  challengeplugin.village:
    description: Teleport to nearest village
    default: true
